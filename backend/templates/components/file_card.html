<button type="button" class="ay-file-card{% if active %} ay-file-card--active{% endif %}" data-file-id="{{ file.file_id }}" data-file-name="{{ file.name }}" data-file-ext="{{ file.ext }}" data-file-meta="{{ file.meta }}" data-file-version="{{ file.version }}" data-download-url="{{ file.download_url }}" data-download-pdf-url="{{ file.download_pdf_url|default:'' }}" data-preview-url="{{ file.preview_url }}" data-open-expanded="{{ file.open_expanded|yesno:'true,false' }}"><span class="ay-file-card__icon">{% include "components/icon.html" with name="filetext" size=19 %}</span><span class="ay-file-card__body"><span class="ay-file-card__name">{{ file.name }}</span><span class="ay-file-card__meta"><span class="ay-file-card__ext">{{ file.ext }}</span><span>· {{ file.meta|cut:"Document · "|cut:"Report · "|cut:"Dashboard · " }}</span></span></span><span class="ay-file-card__chev">{% include "components/icon.html" with name="chevright" size=16 %}</span></button>
