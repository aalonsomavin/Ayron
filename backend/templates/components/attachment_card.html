{% if file.kind == "sheet" or file.ext == "XLSX" or "Spreadsheet ·" in file.meta %}
  {% with card_kind="sheet" icon_name="sheet" %}
<button type="button" class="ay-attachment-card" data-file-id="{{ file.file_id }}" data-file-name="{{ file.name }}" data-file-ext="{{ file.ext }}" data-file-meta="{{ file.meta }}" data-file-kind="{{ card_kind }}" data-file-role="context" data-file-version="{{ file.version }}" data-file-size="{{ file.size_bytes|default:0 }}" data-download-url="{{ file.download_url }}" data-preview-url="{{ file.preview_url }}"><span class="ay-attachment-card__icon ay-attachment-card__icon--{{ card_kind }}">{% include "components/icon.html" with name=icon_name size=17 %}</span><span class="ay-attachment-card__body"><span class="ay-attachment-card__name">{{ file.name }}</span><span class="ay-attachment-card__meta"><span class="ay-attachment-card__ext">{{ file.ext }}</span><span>· {{ file.meta|cut:"Spreadsheet · "|cut:"Document · "|cut:"Report · "|cut:"Dashboard · " }}</span></span></span></button>
  {% endwith %}
{% else %}
  {% with card_kind="doc" icon_name="filetext" %}
<button type="button" class="ay-attachment-card" data-file-id="{{ file.file_id }}" data-file-name="{{ file.name }}" data-file-ext="{{ file.ext }}" data-file-meta="{{ file.meta }}" data-file-kind="{{ card_kind }}" data-file-role="context" data-file-version="{{ file.version }}" data-file-size="{{ file.size_bytes|default:0 }}" data-download-url="{{ file.download_url }}" data-preview-url="{{ file.preview_url }}"><span class="ay-attachment-card__icon ay-attachment-card__icon--{{ card_kind }}">{% include "components/icon.html" with name=icon_name size=17 %}</span><span class="ay-attachment-card__body"><span class="ay-attachment-card__name">{{ file.name }}</span><span class="ay-attachment-card__meta"><span class="ay-attachment-card__ext">{{ file.ext }}</span>{% if file.meta %}<span>· {{ file.meta|cut:"Document · "|cut:"Report · "|cut:"Dashboard · " }}</span>{% endif %}</span></span></button>
  {% endwith %}
{% endif %}
