<dialog id="ay-confirm-dialog" class="ay-confirm-dialog">
  <div class="ay-confirm-dialog__panel">
    <h2 class="ay-confirm-dialog__title">Eliminar chat</h2>
    <p class="ay-confirm-dialog__body">¿Estás seguro de que querés eliminar este chat?</p>
    <div class="ay-confirm-dialog__actions">
      <button type="button" id="ay-confirm-delete-cancel" class="ay-btn ay-btn--ghost ay-btn--sm">Cancelar</button>
      <form id="ay-confirm-delete-form" class="ay-confirm-dialog__form">
        {% csrf_token %}
        <input type="hidden" name="active" id="ay-confirm-delete-active" value="">
        <button type="submit" class="ay-btn ay-btn--sm ay-confirm-dialog__btn--danger">Eliminar</button>
      </form>
    </div>
  </div>
</dialog>
