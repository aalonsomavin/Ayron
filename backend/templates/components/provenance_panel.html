<aside
  class="ay-provenance-panel"
  id="ay-provenance-panel"
  hidden
  aria-hidden="true"
  aria-labelledby="ay-provenance-panel-title"
>
  <header class="ay-provenance-panel__header">
    <h2 class="ay-provenance-panel__title" id="ay-provenance-panel-title">Procedencia del dato</h2>
    <button type="button" class="ay-provenance-panel__close" data-provenance-panel-close aria-label="Cerrar panel">
      {% include "components/icon.html" with name="close" size=18 %}
    </button>
  </header>
  <div class="ay-provenance-panel__body" id="ay-provenance-panel-body">
    <p class="ay-provenance-panel__hint">Haz clic en un KPI o gráfico con procedencia para ver su origen.</p>
  </div>
</aside>
