<aside class="ay-artifact-panel" id="artifact-panel" aria-hidden="true">
  <div class="ay-artifact-panel__resize" data-artifact-resize aria-hidden="true"></div>
  <div class="ay-artifact-panel__header">
    <span class="ay-artifact-panel__file-icon ay-artifact-panel__file-icon--doc">
      {% include "components/icon.html" with name="filetext" size=17 %}
    </span>
    <div class="ay-artifact-panel__title-wrap">
      <div class="ay-artifact-panel__name"></div>
      <div class="ay-artifact-panel__name-field" hidden>
        <span class="ay-artifact-panel__name-input-wrap" data-value="">
          <input type="text" class="ay-artifact-panel__name-input" aria-label="Nombre del dashboard">
        </span>
        <span class="ay-artifact-panel__name-edit-icon" aria-hidden="true">
          {% include "components/icon.html" with name="pencil" size=14 %}
        </span>
      </div>
      <div class="ay-artifact-panel__meta-line">
        <span class="ay-artifact-panel__ext"></span>
        <span>· <span class="ay-artifact-panel__meta-suffix"></span></span>
      </div>
    </div>
    <div class="ay-artifact-panel__actions">
      <span id="artifact-save" class="ay-artifact-panel__save-wrap" hidden></span>
      <button type="button" class="ay-artifact-panel__btn" data-artifact-download title="Download">
        {% include "components/icon.html" with name="download" size=16 %}
      </button>
      <span class="ay-artifact-panel__divider"></span>
      <button type="button" class="ay-artifact-panel__btn" data-artifact-expand title="Expand">
        {% include "components/icon.html" with name="expand" size=16 %}
      </button>
      <button type="button" class="ay-artifact-panel__btn" data-artifact-close title="Close">
        {% include "components/icon.html" with name="close" size=16 %}
      </button>
    </div>
  </div>
  <div class="ay-artifact-panel__stage" id="ay-artifact-panel-stage">
    <div class="ay-artifact-panel__body"></div>
    {% include "components/provenance_panel.html" %}
  </div>
</aside>
