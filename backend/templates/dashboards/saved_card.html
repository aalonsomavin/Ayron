<article
  class="ay-saved-card"
  data-file-id="{{ item.file_id }}"
  data-file-name="{{ item.name }}"
  data-file-ext="{{ item.ext }}"
  data-file-kind="dashboard"
  data-file-meta="{{ item.meta }}"
  data-file-version="{{ item.version }}"
  data-download-url="{{ item.download_url }}"
  data-download-pdf-url="{{ item.download_pdf_url|default:'' }}"
  data-preview-url="{{ item.preview_url }}"
  data-open-expanded="true"
  data-author="{{ item.author }}"
  data-date-label="{{ item.date_label }}"
  data-pinned="{{ item.pinned|yesno:'true,false' }}"
  data-tint="{{ item.tint }}"
  data-series="{{ item.series|join:',' }}"
>
  <div class="ay-saved-card__thumb">
    <canvas class="ay-saved-card__spark" width="320" height="108" aria-hidden="true"></canvas>
    <span class="ay-saved-card__metric">{{ item.metric }}</span>
    <div class="ay-saved-card__thumb-actions">
      <button type="button" class="ay-saved-card__icon-btn" data-saved-pin title="Fijar">
        {% include "components/icon.html" with name="star" size=14 %}
      </button>
      <button type="button" class="ay-saved-card__icon-btn" data-saved-menu title="Más acciones">
        {% include "components/icon.html" with name="dots" size=15 %}
      </button>
    </div>
  </div>
  <div class="ay-saved-card__menu" hidden>
    <button type="button" class="ay-saved-card__menu-item" data-saved-open>
      {% include "components/icon.html" with name="chevright" size=14 %}
      Abrir
    </button>
    <button type="button" class="ay-saved-card__menu-item" data-saved-rename>
      {% include "components/icon.html" with name="pencil" size=14 %}
      Renombrar
    </button>
    <div class="ay-saved-card__menu-divider"></div>
    <button type="button" class="ay-saved-card__menu-item ay-saved-card__menu-item--danger" data-saved-remove>
      {% include "components/icon.html" with name="trash" size=14 %}
      Eliminar
    </button>
  </div>
  <div class="ay-saved-card__body">
    <h3 class="ay-saved-card__title">{{ item.name }}</h3>
    <p class="ay-saved-card__sub">{{ item.sub }}</p>
    <div class="ay-saved-card__footer">
      <span class="ay-saved-card__avatar">{{ item.initials }}</span>
      <span class="ay-saved-card__author">{{ item.author }}</span>
      <span class="ay-saved-card__dot">·</span>
      <span class="ay-saved-card__date">{{ item.date_label }}</span>
    </div>
  </div>
  <div class="ay-saved-card__rename" hidden>
    <input type="text" class="ay-saved-card__rename-input" value="{{ item.name }}" aria-label="Nombre del dashboard">
    <div class="ay-saved-card__rename-actions">
      <button type="button" class="ay-saved-card__rename-save">Guardar</button>
      <button type="button" class="ay-saved-card__rename-cancel">Cancelar</button>
    </div>
  </div>
</article>
