<!DOCTYPE html>
<html lang="en" data-theme="lofi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Django HTMX{% endblock %}</title>
  <script>
    (function(){
      const stored = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", stored || (prefersDark ? "black" : "lofi"));
    })();
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <div class="navbar bg-base-200">
    <div class="navbar-start">
      <a href="{% url 'core:home' %}" class="btn btn-ghost text-xl">Django HTMX</a>
    </div>
    <div class="navbar-center hidden lg:flex">
      <a href="{% url 'core:home' %}" class="btn btn-ghost btn-sm">Home</a>
    </div>
    <div class="navbar-end gap-2">
      <details class="dropdown dropdown-end">
        <summary class="btn btn-ghost btn-circle btn-sm" aria-label="Theme">
          <svg class="fill-current w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
        </summary>
        <ul tabindex="0" class="dropdown-content menu bg-base-200 rounded-box z-10 mt-2 w-36 p-2 shadow">
          <li><a href="#" data-theme-select="lofi">Light</a></li>
          <li><a href="#" data-theme-select="black">Dark</a></li>
        </ul>
      </details>
      {% if user.is_authenticated %}
        <span class="text-sm opacity-70 mr-2">{{ user.username }}</span>
        <a href="{% url 'accounts:logout' %}" class="btn btn-ghost btn-sm">Logout</a>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-sm">Login</a>
      {% endif %}
    </div>
  </div>

  <main class="container mx-auto p-4">
    {% if messages %}
      <div id="toast-area" class="space-y-2 mb-4">
        {% for message in messages %}
          <div role="alert" class="alert alert-{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
            <span>{{ message }}</span>
            <button type="button" class="btn btn-sm btn-ghost" onclick="this.parentElement.remove()">×</button>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <div id="toast-area" class="space-y-2 mb-4"></div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
  <script>
    document.querySelectorAll("[data-theme-select]").forEach(function(el){
      el.addEventListener("click", function(e){
        e.preventDefault();
        var theme = this.getAttribute("data-theme-select");
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
        this.closest("details").removeAttribute("open");
      });
    });
  </script>
</body>
</html>
