<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ayron{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <header class="ay-topbar">
    <a href="{% url 'core:home' %}" class="ay-topbar__brand">
      <img
        src="{% static 'img/ayronone-logo.png' %}"
        alt="AyronOne"
        class="ay-topbar__logo"
        width="280"
        height="83"
      />
    </a>
    <nav class="ay-topbar__nav">
      <a href="{% url 'core:home' %}">Home</a>
      {% if user.is_authenticated %}
        <a href="{% url 'chat:list' %}">Chat</a>
      {% endif %}
    </nav>
    <div class="ay-topbar__end">
      {% if user.is_authenticated %}
        <span>{{ user.username }}</span>
        <a href="{% url 'accounts:logout' %}" class="ay-btn ay-btn--ghost ay-btn--sm">Log out</a>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="ay-btn ay-btn--primary ay-btn--sm">Log in</a>
      {% endif %}
    </div>
  </header>

  {% if messages %}
    <div id="toast-area" style="max-width:720px;margin:16px auto;padding:0 24px;">
      {% for message in messages %}
        <div class="ay-alert ay-alert--error" role="alert" style="margin-bottom:8px;">
          <span>{{ message }}</span>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</body>
</html>
