<div class="ay-dash-page">
  <div class="ay-dash-inner">
    <div class="ay-dash-filter-scope" id="analytics-root">
      <script type="application/json" id="analytics-data">
      {"rows":[
        {"year":2009,"country":"USA","genre":"Rock","amount":12.5,"invoice_id":"INV-1"},
        {"year":2009,"country":"USA","genre":"Jazz","amount":8.2,"invoice_id":"INV-2"},
        {"year":2009,"country":"Canada","genre":"Rock","amount":6.1,"invoice_id":"INV-3"},
        {"year":2010,"country":"USA","genre":"Rock","amount":15.0,"invoice_id":"INV-4"},
        {"year":2010,"country":"USA","genre":"Metal","amount":9.4,"invoice_id":"INV-5"},
        {"year":2010,"country":"Brazil","genre":"Rock","amount":4.8,"invoice_id":"INV-6"},
        {"year":2010,"country":"Brazil","genre":"Jazz","amount":3.2,"invoice_id":"INV-7"},
        {"year":2011,"country":"Canada","genre":"Rock","amount":11.3,"invoice_id":"INV-8"},
        {"year":2011,"country":"Canada","genre":"Jazz","amount":7.6,"invoice_id":"INV-9"},
        {"year":2011,"country":"Germany","genre":"Metal","amount":10.1,"invoice_id":"INV-10"},
        {"year":2011,"country":"Germany","genre":"Rock","amount":8.9,"invoice_id":"INV-11"},
        {"year":2012,"country":"USA","genre":"Rock","amount":18.2,"invoice_id":"INV-12"},
        {"year":2012,"country":"USA","genre":"Jazz","amount":6.5,"invoice_id":"INV-13"},
        {"year":2012,"country":"Germany","genre":"Rock","amount":9.7,"invoice_id":"INV-14"}
      ]}
      </script>

      <div class="ay-dash-slicer-bar" id="year-slicers"></div>
      <div class="ay-dash-filter-chips" id="filter-chips"></div>

      <div class="ay-dash-grid">
        <div class="ay-dash-col ay-dash-col--3">
          <div class="ay-dash-card">
            <div class="ay-dash-kpi-label">Facturación total</div>
            <div class="ay-dash-kpi-value" id="kpi-amount">—</div>
          </div>
        </div>
        <div class="ay-dash-col ay-dash-col--3">
          <div class="ay-dash-card">
            <div class="ay-dash-kpi-label">Facturas</div>
            <div class="ay-dash-kpi-value" id="kpi-count">—</div>
          </div>
        </div>
        <div class="ay-dash-col ay-dash-col--3">
          <div class="ay-dash-card">
            <div class="ay-dash-kpi-label">Facturas únicas</div>
            <div class="ay-dash-kpi-value" id="kpi-distinct">—</div>
          </div>
        </div>
        <div class="ay-dash-col ay-dash-col--3">
          <div class="ay-dash-card">
            <div class="ay-dash-kpi-label">Países</div>
            <div class="ay-dash-kpi-value" id="kpi-countries">—</div>
          </div>
        </div>
      </div>

      <div class="ay-dash-grid ay-dash-grid--charts">
        <div class="ay-dash-col ay-dash-col--12">
          <div class="ay-dash-card ay-dash-card--flush">
            <div class="ay-dash-card-header">
              <span class="ay-dash-card-header__title">Facturación por año</span>
            </div>
            <div class="ay-chart__plot" style="padding:16px 20px 20px;height:280px;">
              <canvas id="chart-time"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="ay-dash-grid">
        <div class="ay-dash-col ay-dash-col--12">
          <div class="ay-dash-card ay-dash-card--flush">
            <div class="ay-dash-card-header">
              <span class="ay-dash-card-header__title">Detalle de facturas</span>
            </div>
            <table class="ay-dash-table" id="detail-table">
              <thead>
                <tr>
                  <th>Factura</th>
                  <th>Año</th>
                  <th>País</th>
                  <th>Género</th>
                  <th class="ay-dash-td-right ay-dash-th-numeric">Importe</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
(function () {
  var root = document.getElementById("analytics-root");
  if (!root) return;

  var data = JSON.parse(document.getElementById("analytics-data").textContent).rows;
  var filters = { year: null, country: null, genre: null };
  var chartInstance = null;

  function unique(values) {
    return Array.from(new Set(values)).sort(function (a, b) {
      return a > b ? 1 : a < b ? -1 : 0;
    });
  }

  function filteredRows() {
    return data.filter(function (row) {
      if (filters.year != null && row.year !== filters.year) return false;
      if (filters.country && row.country !== filters.country) return false;
      if (filters.genre && row.genre !== filters.genre) return false;
      return true;
    });
  }

  function formatCurrency(value) {
    return "$" + Math.round(value).toLocaleString("es-MX");
  }

  function renderSlicers() {
    var years = unique(data.map(function (row) { return row.year; }));
    var bar = document.getElementById("year-slicers");
    bar.innerHTML = '<div class="ay-dash-slicer__pills">' + years.map(function (year) {
      var active = filters.year === year ? " ay-dash-slicer__pill--active" : "";
      return '<button type="button" class="ay-dash-slicer__pill' + active + '" data-year="' + year + '">' + year + "</button>";
    }).join("") + "</div>";
    bar.querySelectorAll("[data-year]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var year = Number(btn.getAttribute("data-year"));
        filters.year = filters.year === year ? null : year;
        render();
      });
    });
  }

  function renderChips() {
    var chips = document.getElementById("filter-chips");
    var items = [];
    if (filters.year != null) items.push({ key: "year", label: "Año " + filters.year });
    if (filters.country) items.push({ key: "country", label: filters.country });
    if (filters.genre) items.push({ key: "genre", label: filters.genre });
    chips.innerHTML = items.map(function (item) {
      return '<button type="button" class="ay-dash-filter-chip" data-clear="' + item.key + '">' + item.label + " ×</button>";
    }).join("");
    chips.querySelectorAll("[data-clear]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        filters[btn.getAttribute("data-clear")] = null;
        render();
      });
    });
  }

  function renderKpis(rows) {
    document.getElementById("kpi-amount").textContent = formatCurrency(
      rows.reduce(function (sum, row) { return sum + row.amount; }, 0)
    );
    document.getElementById("kpi-count").textContent = String(rows.length);
    document.getElementById("kpi-distinct").textContent = String(unique(rows.map(function (r) { return r.invoice_id; })).length);
    document.getElementById("kpi-countries").textContent = String(unique(rows.map(function (r) { return r.country; })).length);
  }

  function renderTable(rows) {
    var tbody = document.querySelector("#detail-table tbody");
    tbody.innerHTML = rows.map(function (row) {
      return "<tr><td class=\"ay-dash-td-mono\">" + row.invoice_id + "</td><td>" + row.year +
        "</td><td>" + row.country + "</td><td>" + row.genre +
        "</td><td class=\"ay-dash-td-right ay-dash-td-mono\">" + formatCurrency(row.amount) + "</td></tr>";
    }).join("");
  }

  function renderChart(rows) {
    var byYear = {};
    rows.forEach(function (row) {
      byYear[row.year] = (byYear[row.year] || 0) + row.amount;
    });
    var labels = Object.keys(byYear).sort();
    var values = labels.map(function (label) { return byYear[label]; });
    var canvas = document.getElementById("chart-time");
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(canvas, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{ label: "Importe", data: values, borderColor: "#3b6ef6", backgroundColor: "rgba(59,110,246,0.12)", fill: true, tension: 0.3 }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { ticks: { callback: function (v) { return formatCurrency(v); } } } }
      }
    });
  }

  function render() {
    var rows = filteredRows();
    renderSlicers();
    renderChips();
    renderKpis(rows);
    renderTable(rows);
    renderChart(rows);
  }

  render();
})();
</script>
