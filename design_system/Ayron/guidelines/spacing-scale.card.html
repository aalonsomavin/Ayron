<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4px base grid" name="Spacing scale" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 28px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text);display:flex;align-items:flex-end;gap:16px}
.u{text-align:center}
.bar{background:var(--ay-ink);border-radius:2px;width:100%}
.l{font-family:var(--ay-font-mono);font-size:10px;color:var(--ay-text-subtle);margin-top:6px}
.col{width:42px}</style>
</head><body>
<div class="u col"><div class="bar" style="height:var(--ay-space-1)"></div><div class="l">1·4</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-2)"></div><div class="l">2·8</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-3)"></div><div class="l">3·12</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-4)"></div><div class="l">4·16</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-5)"></div><div class="l">5·20</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-6)"></div><div class="l">6·24</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-8)"></div><div class="l">8·32</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-10)"></div><div class="l">10·40</div></div>
<div class="u col"><div class="bar" style="height:var(--ay-space-12)"></div><div class="l">12·48</div></div>
</body></html>
