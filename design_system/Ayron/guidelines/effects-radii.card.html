<!-- @dsCard group="Spacing" viewport="700x180" subtitle="Corner radii — sm to full" name="Radii" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:28px 32px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text);display:flex;gap:18px;align-items:flex-end}
.u{text-align:center}
.box{width:80px;height:80px;background:var(--ay-surface);border:1px solid var(--ay-border-strong)}
.l{font-family:var(--ay-font-mono);font-size:10px;color:var(--ay-text-subtle);margin-top:8px}</style>
</head><body>
<div class="u"><div class="box" style="border-radius:var(--ay-radius-xs)"></div><div class="l">xs · 4</div></div>
<div class="u"><div class="box" style="border-radius:var(--ay-radius-sm)"></div><div class="l">sm · 6</div></div>
<div class="u"><div class="box" style="border-radius:var(--ay-radius-md)"></div><div class="l">md · 8</div></div>
<div class="u"><div class="box" style="border-radius:var(--ay-radius-lg)"></div><div class="l">lg · 12</div></div>
<div class="u"><div class="box" style="border-radius:var(--ay-radius-xl)"></div><div class="l">xl · 16</div></div>
<div class="u"><div class="box" style="border-radius:var(--ay-radius-full)"></div><div class="l">full</div></div>
</body></html>
