<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 28px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text);display:flex;gap:8px}
.sw{flex:1;text-align:center}
.chip{height:60px;border-radius:var(--ay-radius-sm)}
.l{font-family:var(--ay-font-mono);font-size:10px;color:var(--ay-text-subtle);margin-top:6px}</style>
</head><body>
<div class="sw"><div class="chip" style="background:var(--ay-chart-1)"></div><div class="l">chart-1</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-chart-2)"></div><div class="l">chart-2</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-chart-3)"></div><div class="l">chart-3</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-chart-4)"></div><div class="l">chart-4</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-chart-5)"></div><div class="l">chart-5</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-chart-6)"></div><div class="l">chart-6</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-chart-7)"></div><div class="l">chart-7</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-chart-8)"></div><div class="l">chart-8</div></div>
</body></html>
