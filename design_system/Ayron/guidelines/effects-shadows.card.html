<!-- @dsCard group="Spacing" viewport="700x200" subtitle="Soft, low-contrast elevation" name="Shadows" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:36px 32px;background:var(--ay-bg-subtle);font-family:var(--ay-font-sans);color:var(--ay-text);display:flex;gap:26px;align-items:center;justify-content:center}
.u{text-align:center}
.box{width:96px;height:72px;background:var(--ay-surface);border:1px solid var(--ay-border);border-radius:var(--ay-radius-lg)}
.l{font-family:var(--ay-font-mono);font-size:10px;color:var(--ay-text-subtle);margin-top:12px}</style>
</head><body>
<div class="u"><div class="box" style="box-shadow:var(--ay-shadow-xs)"></div><div class="l">xs</div></div>
<div class="u"><div class="box" style="box-shadow:var(--ay-shadow-sm)"></div><div class="l">sm</div></div>
<div class="u"><div class="box" style="box-shadow:var(--ay-shadow-md)"></div><div class="l">md</div></div>
<div class="u"><div class="box" style="box-shadow:var(--ay-shadow-lg)"></div><div class="l">lg</div></div>
</body></html>
