<!-- @dsCard group="Colors" viewport="700x150" subtitle="Primary actions are near-black ink" name="Ink / primary" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 28px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text);display:flex;gap:14px}
.sw{flex:1;border-radius:var(--ay-radius-md);border:1px solid var(--ay-border);overflow:hidden}
.cap{display:flex;flex-direction:column;height:78px;justify-content:flex-end;padding:10px 12px}
.name{font-size:12px;font-weight:600}.hex{font-family:var(--ay-font-mono);font-size:11px;opacity:.75}</style>
</head><body>
<div class="sw"><div class="cap" style="background:var(--ay-ink);color:#fff"><span class="name">ink / primary</span><span class="hex">#131316</span></div></div>
<div class="sw"><div class="cap" style="background:var(--ay-ink-hover);color:#fff"><span class="name">primary hover</span><span class="hex">#000000</span></div></div>
<div class="sw"><div class="cap" style="background:var(--ay-ink-soft);color:#fff"><span class="name">ink soft</span><span class="hex">#2a2a30</span></div></div>
</body></html>
