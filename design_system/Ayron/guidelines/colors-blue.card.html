<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 28px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text);display:flex;gap:8px}
.sw{flex:1;text-align:center}
.chip{height:60px;border-radius:var(--ay-radius-sm);border:1px solid var(--ay-border)}
.n{font-size:11px;font-weight:600;margin-top:6px}.h{font-family:var(--ay-font-mono);font-size:10px;color:var(--ay-text-subtle)}</style>
</head><body>
<div class="sw"><div class="chip" style="background:var(--ay-blue-50)"></div><div class="n">50</div><div class="h">#eef3ff</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-blue-100)"></div><div class="n">100</div><div class="h">#dde7ff</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-blue-300)"></div><div class="n">300</div><div class="h">#9db8fb</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-blue-500)"></div><div class="n">500 · accent</div><div class="h">#3b6ef6</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-blue-600)"></div><div class="n">600</div><div class="h">#2f5fe0</div></div>
<div class="sw"><div class="chip" style="background:var(--ay-blue-700)"></div><div class="n">700</div><div class="h">#2348b0</div></div>
</body></html>
