<!-- @dsCard group="Colors" viewport="700x150" subtitle="Status only — success, warning, danger, info" name="Semantic" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 28px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text);display:flex;gap:14px}
.sw{flex:1}
.pair{display:flex;border-radius:var(--ay-radius-md);overflow:hidden;border:1px solid var(--ay-border);height:56px}
.solid{flex:1.6}.tint{flex:1}
.n{font-size:12px;font-weight:600;margin-top:8px}.h{font-family:var(--ay-font-mono);font-size:10px;color:var(--ay-text-subtle)}</style>
</head><body>
<div class="sw"><div class="pair"><div class="solid" style="background:var(--ay-success-500)"></div><div class="tint" style="background:var(--ay-success-50)"></div></div><div class="n">Success</div><div class="h">#16a34a</div></div>
<div class="sw"><div class="pair"><div class="solid" style="background:var(--ay-warning-500)"></div><div class="tint" style="background:var(--ay-warning-50)"></div></div><div class="n">Warning</div><div class="h">#d97706</div></div>
<div class="sw"><div class="pair"><div class="solid" style="background:var(--ay-danger-500)"></div><div class="tint" style="background:var(--ay-danger-50)"></div></div><div class="n">Danger</div><div class="h">#dc2626</div></div>
<div class="sw"><div class="pair"><div class="solid" style="background:var(--ay-info-500)"></div><div class="tint" style="background:var(--ay-info-50)"></div></div><div class="n">Info</div><div class="h">#2563eb</div></div>
</body></html>
