<!-- @dsCard group="Colors" viewport="700x150" subtitle="Neutral gray scale 0–950" name="Neutrals" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 28px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text)}
.row{display:flex;gap:6px}
.sw{flex:1;text-align:center}
.chip{height:56px;border-radius:var(--ay-radius-sm);border:1px solid var(--ay-border)}
.l{font-family:var(--ay-font-mono);font-size:10px;color:var(--ay-text-subtle);margin-top:6px}</style>
</head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-0)"></div><div class="l">0</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-50)"></div><div class="l">50</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-100)"></div><div class="l">100</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-200)"></div><div class="l">200</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-300)"></div><div class="l">300</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-400)"></div><div class="l">400</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-500)"></div><div class="l">500</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-600)"></div><div class="l">600</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-700)"></div><div class="l">700</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-800)"></div><div class="l">800</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-900)"></div><div class="l">900</div></div>
  <div class="sw"><div class="chip" style="background:var(--ay-neutral-950)"></div><div class="l">950</div></div>
</div>
</body></html>
