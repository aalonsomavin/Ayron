<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:28px 32px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text)}
.row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--ay-border-subtle)}
.row:last-child{border-bottom:0}
.tag{font-family:var(--ay-font-mono);font-size:11px;color:var(--ay-text-subtle);width:108px;flex:none}</style>
</head><body>
<div class="row"><span class="tag">display · 48/700</span><span style="font-size:var(--ay-text-display);font-weight:700;letter-spacing:var(--ay-tracking-tight);line-height:1">Ask your data</span></div>
<div class="row"><span class="tag">h1 · 34/700</span><span style="font-size:var(--ay-text-h1);font-weight:700;letter-spacing:var(--ay-tracking-tight)">Revenue overview</span></div>
<div class="row"><span class="tag">h2 · 26/600</span><span style="font-size:var(--ay-text-h2);font-weight:600;letter-spacing:var(--ay-tracking-snug)">Connected sources</span></div>
<div class="row"><span class="tag">h3 · 20/600</span><span style="font-size:var(--ay-text-h3);font-weight:600">Monthly active users</span></div>
<div class="row"><span class="tag">h4 · 17/600</span><span style="font-size:var(--ay-text-h4);font-weight:600">Automation settings</span></div>
<div class="row"><span class="tag">body · 15/400</span><span style="font-size:var(--ay-text-body)">Connect your sources and let Ayron query, chart, and automate.</span></div>
<div class="row"><span class="tag">sm · 13/400</span><span style="font-size:var(--ay-text-sm);color:var(--ay-text-muted)">Synced 4 minutes ago · 1.2M rows</span></div>
<div class="row"><span class="tag">xs · 12/500</span><span style="font-size:var(--ay-text-xs);font-weight:500;color:var(--ay-text-subtle);text-transform:uppercase;letter-spacing:var(--ay-tracking-wide)">Sources</span></div>
</body></html>
