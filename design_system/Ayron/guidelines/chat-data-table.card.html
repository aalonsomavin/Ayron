<!-- @dsCard group="Chat" viewport="760x300" subtitle="Agent inline tables · ≤25 rows" name="Chat data table" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:24px 28px;background:var(--ay-bg);font-family:var(--ay-font-sans);color:var(--ay-text)}
.ay-data-table{margin-top:12px}
.ay-card{background:var(--ay-surface);border:1px solid var(--ay-border);border-radius:var(--ay-radius-lg);overflow:hidden}
.ay-data-table__grid{display:grid;column-gap:12px;padding:0 16px;grid-template-columns:2fr 1fr 1fr}
.ay-data-table__head,.ay-data-table__row{display:grid;grid-column:1/-1;grid-template-columns:subgrid;align-items:center}
.ay-data-table__head{padding:9px 16px;margin:0 -16px;font-size:11.5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--ay-text-subtle);background:var(--ay-bg-subtle);border-bottom:1px solid var(--ay-border-subtle)}
.ay-data-table__row{padding:11px 0;font-size:14px;border-top:1px solid var(--ay-border-subtle)}
.ay-data-table__cell{font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ay-data-table__cell--mono{font-family:var(--ay-font-mono);font-size:13px;font-weight:400}
.ay-data-table__caption{padding:10px 16px 14px;font-size:12px;color:var(--ay-text-muted);border-top:1px solid var(--ay-border-subtle)}
</style>
</head><body>
<div class="ay-data-table">
  <div class="ay-card">
    <div class="ay-data-table__grid">
      <div class="ay-data-table__head"><span>Artist</span><span>Tracks sold</span><span>Revenue</span></div>
      <div class="ay-data-table__row"><span class="ay-data-table__cell">Iron Maiden</span><span class="ay-data-table__cell ay-data-table__cell--mono">140</span><span class="ay-data-table__cell ay-data-table__cell--mono">$138.60</span></div>
      <div class="ay-data-table__row"><span class="ay-data-table__cell">Metallica</span><span class="ay-data-table__cell ay-data-table__cell--mono">112</span><span class="ay-data-table__cell ay-data-table__cell--mono">$110.88</span></div>
      <div class="ay-data-table__row"><span class="ay-data-table__cell">U2</span><span class="ay-data-table__cell ay-data-table__cell--mono">98</span><span class="ay-data-table__cell ay-data-table__cell--mono">$96.04</span></div>
      <div class="ay-data-table__row"><span class="ay-data-table__cell">Led Zeppelin</span><span class="ay-data-table__cell ay-data-table__cell--mono">87</span><span class="ay-data-table__cell ay-data-table__cell--mono">$85.26</span></div>
      <div class="ay-data-table__row"><span class="ay-data-table__cell">Deep Purple</span><span class="ay-data-table__cell ay-data-table__cell--mono">76</span><span class="ay-data-table__cell ay-data-table__cell--mono">$74.48</span></div>
    </div>
    <div class="ay-data-table__caption">Top 5 of 275 artists · Chinook demo store</div>
  </div>
</div>
</body></html>
