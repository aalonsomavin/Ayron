<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ayron · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
<style>
  /* ===========================================================
     AYRON · LOGIN — standalone, sin dependencias (vanilla JS)
     -----------------------------------------------------------
     Para integrar en la app:
       - Conecta el <form id="ay-form"> a tu auth real (submit handler abajo).
       - Cambia el fondo math art con los atributos data-motif / data-palette
         en <canvas id="ay-art">  (ver MOTIFS / PALETTES más abajo).
     =========================================================== */
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  ::selection{background:#eef3ff}
  input{font-family:inherit}
  button{font-family:inherit}
  canvas{display:block}
  input::placeholder{color:#a7a7af}
  @keyframes ay-spin{to{transform:rotate(360deg)}}

  .ay-root{height:100vh;display:flex;background:#fff;font-family:'Geist',system-ui,sans-serif;color:#18181b;-webkit-font-smoothing:antialiased;overflow:hidden}

  /* ---- LEFT · brand / math art ---- */
  .ay-side{flex:1.15;min-width:0;position:relative;overflow:hidden;background:#f4f6f9;border-right:1px solid #e6e6e8}
  #ay-art{position:absolute;inset:0;width:100%;height:100%}
  .ay-wash1{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(244,246,249,0.7) 0%,rgba(244,246,249,0) 30%,rgba(244,246,249,0) 56%,rgba(244,246,249,0.94) 100%)}
  .ay-wash2{position:absolute;inset:0;pointer-events:none;background:radial-gradient(58% 44% at 26% 50%,rgba(244,246,249,0.97) 0%,rgba(244,246,249,0.86) 38%,rgba(244,246,249,0.45) 62%,rgba(244,246,249,0) 80%)}
  .ay-side-inner{position:relative;height:100%;display:flex;flex-direction:column;justify-content:center;padding:40px 44px}
  .ay-eyebrow{position:absolute;top:40px;left:44px;display:flex;align-items:center;gap:9px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.16em;color:#6e7686;text-transform:uppercase}
  .ay-dot{width:7px;height:7px;border-radius:50%;background:#3b6ef6}
  .ay-side h2{margin:0;font-size:32px;line-height:1.1;font-weight:600;letter-spacing:-0.025em;color:#18181b;text-wrap:balance}
  .ay-side p{margin:14px 0 0;font-size:15px;line-height:1.6;color:#52525b;max-width:360px;text-wrap:pretty}
  .ay-foot{position:absolute;bottom:40px;left:44px;display:inline-flex;align-items:center;gap:10px;font-family:'Geist Mono',monospace;font-size:11px;color:#8a8a92}
  .ay-foot .tag{padding:4px 9px;border:1px solid #d8dde6;border-radius:999px;background:rgba(255,255,255,0.6)}

  /* ---- RIGHT · form ---- */
  .ay-main{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;background:#fff;padding:32px 24px;overflow-y:auto}
  .ay-card{width:100%;max-width:344px}
  .ay-logo-wrap{display:flex;justify-content:center;margin-bottom:24px}
  .ay-logo-wrap img{height:30px;width:auto;display:block}
  .ay-card h1{margin:0;font-size:22px;font-weight:600;letter-spacing:-0.02em;text-align:center}
  .ay-card .sub{margin:7px 0 28px;font-size:13.5px;color:#8a8a92;text-align:center;text-wrap:pretty}
  .ay-label{display:block;font-size:12.5px;font-weight:500;color:#3f3f46;margin-bottom:7px}
  .ay-field{display:flex;align-items:center;gap:9px;height:46px;padding:0 13px;border:1px solid #d6d6da;border-radius:10px;background:#fff;margin-bottom:16px;transition:border-color .15s,box-shadow .15s}
  .ay-field.pw{padding:0 8px 0 13px;margin-bottom:14px}
  .ay-field:focus-within{border-color:#3b6ef6;box-shadow:0 0 0 3px rgba(59,110,246,0.16)}
  .ay-field svg.ic{flex:none}
  .ay-field input{flex:1;border:none;outline:none;background:transparent;font-size:14.5px;color:#18181b;height:100%}
  .ay-eye{width:32px;height:32px;flex:none;display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:7px;background:transparent;color:#8a8a92;cursor:pointer;transition:background .12s,color .12s}
  .ay-eye:hover{background:#f4f4f5;color:#52525b}
  .ay-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;min-height:20px;gap:12px}
  .ay-remember{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#52525b;cursor:pointer;user-select:none}
  .ay-remember input{width:15px;height:15px;accent-color:#3b6ef6;cursor:pointer}
  .ay-forgot{font-size:13px;color:#3b6ef6;text-decoration:none;font-weight:500;white-space:nowrap}
  .ay-submit{width:100%;height:46px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;background:#131316;color:#fff;font-size:14.5px;font-weight:500;cursor:pointer;transition:background .15s}
  .ay-submit:hover{background:#000}
  .ay-submit[disabled]{background:#3a3a40;cursor:default}
  .ay-foot-text{text-align:center;font-size:13px;color:#8a8a92;margin:22px 0 0}
  .ay-foot-text a{color:#18181b;font-weight:500;text-decoration:none}

  @media (max-width:880px){ .ay-side{display:none} }
</style>
</head>
<body>
<div class="ay-root">

  <!-- ===== LEFT · BRAND / MATH ART ===== -->
  <div class="ay-side">
    <canvas id="ay-art" data-motif="hilbert" data-palette="azul"></canvas>
    <div class="ay-wash1"></div>
    <div class="ay-wash2"></div>
    <div class="ay-side-inner">
      <div class="ay-eyebrow"><span class="ay-dot"></span>Ayron · Analytics</div>
      <div style="max-width:420px">

      </div>
      <div class="ay-foot"><span class="tag" id="ay-motif-label">Curva de Hilbert</span><span id="ay-motif-sub">orden 6 · 4⁶ vértices</span></div>
    </div>
  </div>

          <input id="ay-user" type="text" autocomplete="username" placeholder="tu_usuario">
        </div>

        <label class="ay-label" for="ay-pw">Contraseña</label>
        <div class="ay-field pw">
          <svg class="ic" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8a8a92" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <input id="ay-pw" type="password" autocomplete="current-password" placeholder="••••••••">
          <button type="button" class="ay-eye" id="ay-eye" title="Mostrar u ocultar contraseña" aria-label="Mostrar u ocultar contraseña"></button>
        </div>

        <div class="ay-row">
          <label class="ay-remember"><input type="checkbox">Recordarme</label>
          <a href="#" class="ay-forgot" id="ay-forgot">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="ay-submit" id="ay-submit">Iniciar sesión</button>
      </form>

      <p class="ay-foot-text">¿No tienes cuenta? <a href="#" id="ay-create">Crear una</a></p>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* =====================================================================
     MATH ART ENGINE — 6 motivos × 2 paletas, estático, vanilla canvas
     MOTIFS:  hilbert · truchet · maze · golden · contours · triangles
     PALETTES: azul (azul de marca) · ayron (lima → verde azulado)
     Controla con  data-motif / data-palette  en <canvas id="ay-art">.
     ===================================================================== */

  var LABELS = {
    hilbert:  ["Curva de Hilbert", "orden 6 · 4⁶ vértices"],
    truchet:  ["Mosaico de Truchet", "arcos · teselado"],
    maze:     ["Laberinto", "backtracker recursivo"],
    golden:   ["Espiral áurea", "φ ≈ 1.618"],
    contours: ["Campo de contornos", "Σ sin(·)"],
    triangles:["Malla triangular", "lattice isométrico"]
  };

  function rng(seed){
    var a = (seed|0) || 1;
    return function(){
      a|=0; a=(a+0x6D2B79F5)|0;
      var t=Math.imul(a^(a>>>15),1|a);
      t=(t+Math.imul(t^(t>>>7),61|t))^t;
      return ((t^(t>>>14))>>>0)/4294967296;
    };
  }
  function grad(ctx,w,h,palette){
    var g=ctx.createLinearGradient(0,0,w,h);
    if(palette==="ayron"){ g.addColorStop(0,"#cfe96a"); g.addColorStop(0.5,"#46c193"); g.addColorStop(1,"#168b80"); }
    else { g.addColorStop(0,"#9aa7c4"); g.addColorStop(0.55,"#5b7fe0"); g.addColorStop(1,"#3b6ef6"); }
    return g;
  }

  function mHilbert(ctx,w,h,r,pal){
    var order=6, side=1<<order, N=side*side;
    var span=Math.max(w,h)*1.06, cell=span/(side-1);
    var ox=(w-cell*(side-1))/2, oy=(h-cell*(side-1))/2;
    function rot(s,x,y,rx,ry){ if(ry===0){ if(rx===1){ x=s-1-x; y=s-1-y; } var t=x; x=y; y=t; } return [x,y]; }
    var pts=[];
    for(var dd=0; dd<N; dd++){
      var rx,ry,t=dd,x=0,y=0;
      for(var s=1; s<side; s*=2){ rx=1&(t/2|0); ry=1&(t^rx); var rr=rot(s,x,y,rx,ry); x=rr[0]; y=rr[1]; x+=s*rx; y+=s*ry; t=Math.floor(t/4); }
      pts.push([ox+x*cell, oy+y*cell]);
    }
    ctx.strokeStyle=grad(ctx,w,h,pal); ctx.globalAlpha=0.9; ctx.lineWidth=1.15; ctx.lineJoin="round"; ctx.lineCap="round";
    ctx.beginPath();
    for(var i=0;i<pts.length;i++){ var p=pts[i]; i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]); }
    ctx.stroke(); ctx.globalAlpha=1;
  }

  function mTruchet(ctx,w,h,rnd,pal){
    var cell=Math.max(26,Math.min(w,h)/13);
    var cols=Math.ceil(w/cell)+1, rows=Math.ceil(h/cell)+1, rad=cell/2;
    ctx.strokeStyle=grad(ctx,w,h,pal); ctx.globalAlpha=0.85; ctx.lineWidth=1.4; ctx.lineCap="round";
    for(var j=0;j<rows;j++) for(var i=0;i<cols;i++){
      var x=i*cell, y=j*cell;
      ctx.beginPath();
      if(rnd()<0.5){
        ctx.arc(x,y,rad,0,Math.PI/2);
        ctx.moveTo(x+cell,y+cell); ctx.arc(x+cell,y+cell,rad,Math.PI,Math.PI*1.5);
      } else {
        ctx.arc(x+cell,y,rad,Math.PI/2,Math.PI);
        ctx.moveTo(x,y+cell); ctx.arc(x,y+cell,rad,Math.PI*1.5,Math.PI*2);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  function mMaze(ctx,w,h,rnd,pal){
    var cell=Math.max(22,Math.min(w,h)/16);
    var cols=Math.max(2,Math.floor(w/cell)), rows=Math.max(2,Math.floor(h/cell));
    var ox=(w-(cols-1)*cell)/2, oy=(h-(rows-1)*cell)/2;
    function id(x,y){ return y*cols+x; }
    var vis=new Uint8Array(cols*rows), edges=[];
    var stack=[[0,0]]; vis[0]=1;
    var dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    while(stack.length){
      var c=stack[stack.length-1], cx=c[0], cy=c[1], nb=[];
      for(var k=0;k<dirs.length;k++){ var d=dirs[k], nx=cx+d[0], ny=cy+d[1]; if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!vis[id(nx,ny)]) nb.push([nx,ny]); }
      if(nb.length){ var n=nb[Math.floor(rnd()*nb.length)]; vis[id(n[0],n[1])]=1; edges.push([cx,cy,n[0],n[1]]); stack.push(n); }
      else stack.pop();
    }
    ctx.strokeStyle=grad(ctx,w,h,pal); ctx.globalAlpha=0.85; ctx.lineWidth=1.7; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath();
    for(var e=0;e<edges.length;e++){ var e2=edges[e]; ctx.moveTo(ox+e2[0]*cell,oy+e2[1]*cell); ctx.lineTo(ox+e2[2]*cell,oy+e2[3]*cell); }
    ctx.stroke(); ctx.globalAlpha=1;
  }

  function mGolden(ctx,w,h,r,pal){
    var g=grad(ctx,w,h,pal), phi=1.618033, RW,RH;
    if(w/h>=phi){ RW=w*1.08; RH=RW/phi; } else { RH=h*1.08; RW=RH*phi; }
    var x=(w-RW)/2, y=(h-RH)/2, W=RW, H=RH;
    var o=(W>=H)?0:1, squares=[], arcs=[], steps=0;
    while(Math.min(W,H)>2 && steps<60){
      var s=Math.min(W,H);
      if(o===0){ squares.push([x,y,s,s]); arcs.push([x+s,y+s,s,Math.PI,Math.PI*1.5]); x+=s; W-=s; }
      else if(o===1){ squares.push([x,y,s,s]); arcs.push([x,y+s,s,Math.PI*1.5,Math.PI*2]); y+=s; H-=s; }
      else if(o===2){ squares.push([x+W-s,y,s,s]); arcs.push([x+W-s,y,s,0,Math.PI*0.5]); W-=s; }
      else { squares.push([x,y+H-s,s,s]); arcs.push([x+s,y+H-s,s,Math.PI*0.5,Math.PI]); H-=s; }
      o=(o+1)%4; steps++;
    }
    ctx.strokeStyle=g; ctx.globalAlpha=0.22; ctx.lineWidth=1; ctx.lineJoin="miter";
    for(var i=0;i<squares.length;i++){ var sq=squares[i]; ctx.strokeRect(sq[0],sq[1],sq[2],sq[3]); }
    ctx.globalAlpha=0.92; ctx.lineWidth=1.8; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath();
    for(var a=0;a<arcs.length;a++){ var ar=arcs[a]; ctx.arc(ar[0],ar[1],ar[2],ar[3],ar[4]); }
    ctx.stroke(); ctx.globalAlpha=1;
  }

  function mContours(ctx,w,h,r,pal){
    var gap=Math.max(11,Math.min(w,h)/22);
    ctx.strokeStyle=grad(ctx,w,h,pal); ctx.globalAlpha=0.72; ctx.lineWidth=1.1; ctx.lineJoin="round";
    for(var by=-gap; by<h+gap; by+=gap){
      ctx.beginPath();
      for(var x=0; x<=w; x+=4){
        var yy=by+Math.sin(x*0.012+by*0.03)*gap*0.62+Math.sin(x*0.027+by*0.018)*gap*0.36;
        x===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  function mTriangles(ctx,w,h,r,pal){
    var s=Math.max(28,Math.min(w,h)/11), dy=s*0.866;
    ctx.strokeStyle=grad(ctx,w,h,pal); ctx.globalAlpha=0.66; ctx.lineWidth=1; ctx.lineJoin="round";
    ctx.beginPath();
    var row=0;
    for(var y=-dy; y<=h+dy; y+=dy, row++){
      var xoff=(row%2)?s/2:0;
      for(var x=-s; x<=w+s; x+=s){
        var px=x+xoff;
        ctx.moveTo(px,y); ctx.lineTo(px+s,y);
        ctx.moveTo(px,y); ctx.lineTo(px-s/2,y+dy);
        ctx.moveTo(px,y); ctx.lineTo(px+s/2,y+dy);
      }
    }
    ctx.stroke(); ctx.globalAlpha=1;
  }

  var MOTIFS={ hilbert:mHilbert, truchet:mTruchet, maze:mMaze, golden:mGolden, contours:mContours, triangles:mTriangles };

  function drawArt(canvas){
    var motif=canvas.getAttribute("data-motif")||"hilbert";
    var pal=canvas.getAttribute("data-palette")||"azul";
    var seed=parseInt(canvas.getAttribute("data-seed"),10); if(isNaN(seed)) seed=7;
    var dpr=Math.min(window.devicePixelRatio||1,2);
    var rect=canvas.getBoundingClientRect();
    var w=Math.max(1,rect.width), h=Math.max(1,rect.height);
    canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);
    var ctx=canvas.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,w,h);
    (MOTIFS[motif]||mHilbert)(ctx,w,h,rng(seed),pal);
    var lbl=LABELS[motif]||LABELS.hilbert;
    var le=document.getElementById("ay-motif-label"), se=document.getElementById("ay-motif-sub");
    if(le) le.textContent=lbl[0];
    if(se) se.textContent=lbl[1];
  }

  var art=document.getElementById("ay-art");
  function redraw(){ if(art) drawArt(art); }
  redraw();
  window.addEventListener("resize", redraw);
  if(window.ResizeObserver && art){ new ResizeObserver(redraw).observe(art); }

  /* =====================================================================
     FORM behaviour — password toggle + submit state
     Conecta tu auth real dentro del submit handler (ver TODO).
     ===================================================================== */
  var EYE_OPEN='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
  var EYE_OFF='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"></path><path d="M10.73 5.08A10.4 10.4 0 0 1 12 5c6.5 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 5.39-1.61"></path><path d="m2 2 20 20"></path></svg>';
  var SPINNER='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" style="animation:ay-spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>';

  var pw=document.getElementById("ay-pw"), eye=document.getElementById("ay-eye");
  eye.innerHTML=EYE_OPEN;
  eye.addEventListener("click", function(){
    var hidden = pw.type==="password";
    pw.type = hidden ? "text" : "password";
    eye.innerHTML = hidden ? EYE_OFF : EYE_OPEN;
  });

  var form=document.getElementById("ay-form"), submit=document.getElementById("ay-submit");
  form.addEventListener("submit", function(ev){
    ev.preventDefault();
    if(submit.disabled) return;
    submit.disabled=true;
    submit.innerHTML=SPINNER+'Iniciando sesión…';

    // ---- TODO: reemplaza por tu autenticación real ----
    var user=document.getElementById("ay-user").value;
    var pass=pw.value;
    // fetch('/api/login', { method:'POST', body: JSON.stringify({user,pass}) })...
    setTimeout(function(){
      submit.disabled=false;
      submit.innerHTML='Iniciar sesión';
    }, 1300);
  });

  document.getElementById("ay-forgot").addEventListener("click", function(e){ e.preventDefault(); });
  document.getElementById("ay-create").addEventListener("click", function(e){ e.preventDefault(); });
})();
</script>
</body>
