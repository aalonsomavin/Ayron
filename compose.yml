x-web-env: &web-env
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DATABASE_URL: postgres://django:django@db:5432/django
  SECRET_KEY: dev-secret-key-change-in-production
  DEBUG: "1"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-openai:gpt-4o}
  DEMO_DB_URL: ${DEMO_DB_URL:-postgres://demo:demo@demo-db:5432/mexar_demo}
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-}
  LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}

services:
  web:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      <<: *web-env
    depends_on:
      db:
        condition: service_healthy
      demo-db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    volumes:
      - ./backend:/app
    environment:
      <<: *web-env
    command: celery -A config worker -l info
    depends_on:
      db:
        condition: service_healthy
      demo-db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: django
      POSTGRES_PASSWORD: django
      POSTGRES_DB: django
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django -d django"]
      interval: 2s
      timeout: 5s
      retries: 5

  demo-db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: mexar_demo
    volumes:
      - demo_db_data:/var/lib/postgresql/data
      - ./backend/demo_data/mexar_pharma/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d mexar_demo"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  tailwind:
    build:
      context: .
      dockerfile: docker/tailwind/Dockerfile
    volumes:
      - ./backend:/app/../backend
      - ./frontend/src:/app/src
      - ./design_system:/design_system
      - ./backend/static/css:/output
    command: npm run dev:docker

volumes:
  postgres_data:
  demo_db_data:
